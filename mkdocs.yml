site_name: Ghidra Help
site_description: Markdown conversion of Ghidra's built-in HTML help.

extra_css:
  - stylesheets/extra.css

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  custom_dir: overrides
  logo: images/GHIDRA_3.png
  favicon: images/GHIDRA_3.png
  features:
    # Search UX: instant results, snippets, term highlighting, share link.
    - search.suggest
    - search.highlight
    - search.share
    # Faster page transitions (SPA-style swap, no full reloads).
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    # Top-bar dropdown of the merged Ghidra TOC.
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.footer
    # Code block niceties.
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    # Dark scheme listed first → used as the default. Light is opt-in via
    # the toggle. (No `media:` queries, otherwise the OS preference wins.)
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

# Drive the top-bar nav from per-version SUMMARY.md. The converter
# regenerates these each run, mirroring the full Ghidra ToC tree.
plugins:
  - search:
      # Split identifiers like BSimCtl, file.md#anchor, int_3, snake_case,
      # PascalCase so any sub-token finds the page.
      separator: '[\s\-,:!=\[\]()"`/\._#]+|(?<=[a-z])(?=[A-Z])|(?<=[A-Z])(?=[A-Z][a-z])'
  - literate-nav:
      nav_file: SUMMARY.md

# Markdown extensions material expects + a few that improve fidelity for
# Ghidra docs (notes/tips/warnings rendered as admonitions, attribute
# lists for inline IDs, def-list for our pandoc-style definition lists).
markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

# Drop the "Made with Material for MkDocs" footer credit. (Both this
# and the now-unused overrides/main.html were carried over from the
# default mkdocs theme.)
extra:
  generator: false

# Promote mkdocs's built-in link/anchor checks to `warn`. Run
# `./scripts/check_links.sh` (which adds `--strict`) to fail on any
# warning. Catches broken `[text](file.md#anchor)` references better
# than lychee, with no `use_directory_urls` false-positives.
validation:
  nav:
    omitted_files: ignore
    # Anchor refs in SUMMARY.md are validated against rendered HTML by
    # `validation.links.anchors` instead — mkdocs's nav-builder doesn't
    # resolve them and would otherwise flag every one as "not found".
    not_found: info
  links:
    anchors: warn
    # `folder/` entries in SUMMARY.md are literate-nav recursion markers
    # mkdocs doesn't recognize as regular links.
    unrecognized_links: info
    absolute_links: warn
