name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pre-empt the September 2026 Node 20 removal — opt every JS-based action
# into Node 24 now so the warning annotation disappears and we don't
# break on the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Pages deployment needs these on the workflow's GITHUB_TOKEN.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Convert + link check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Pin the Ghidra version the CI converts against. Bump when a new
    # release lands; the release tag and the unzipped folder name are
    # always derivable from these two values.
    env:
      GHIDRA_VERSION: "12.0.4"
      GHIDRA_RELEASE_TAG: "Ghidra_12.0.4_build"

    outputs:
      site_artifact_id: ${{ steps.upload-pages.outputs.artifact_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java (Ghidra requires JDK 21+)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache Ghidra release
        id: ghidra-cache
        uses: actions/cache@v4
        with:
          path: ghidra-install
          key: ghidra-${{ env.GHIDRA_VERSION }}-v1

      - name: Download and extract Ghidra
        if: steps.ghidra-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ghidra-install
          cd ghidra-install
          gh release download "$GHIDRA_RELEASE_TAG" \
            --repo NationalSecurityAgency/ghidra \
            --pattern 'ghidra_*_PUBLIC_*.zip'
          unzip -q ghidra_*_PUBLIC_*.zip
          rm ghidra_*_PUBLIC_*.zip

      - name: Locate Ghidra install dir
        id: ghidra
        run: |
          dir="$(find ghidra-install -maxdepth 2 -name ghidraRun -printf '%h\n' | head -1)"
          if [ -z "$dir" ]; then
            echo "Could not locate ghidraRun under ghidra-install/" >&2
            exit 1
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          echo "Using Ghidra at: $dir"

      - name: Install dependencies
        run: uv sync

      - name: Run converter
        run: uv run ghidra-help-to-markdown "${{ steps.ghidra.outputs.dir }}" ./docs

      - name: Link check (mkdocs --strict)
        run: ./scripts/check_links.sh

      - name: Build mkdocs site
        run: uvx --from mkdocs-material --with mkdocs-literate-nav mkdocs build --strict --site-dir site

      - name: Upload converted docs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-docs
          path: docs/
          retention-days: 14

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        id: upload-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
