title: Ghidra Help
description: Markdown conversion of the Ghidra HTML help, generated by ghidra-help-to-markdown.
theme: jekyll-theme-cayman

plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index

relative_links:
  enabled: true
  collections: true

optional_front_matter:
  remove_originals: true

readme_index:
  enabled: true
  remove_originals: true

include:
  - "Ghidra_*"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
